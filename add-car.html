<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFinder BG | Добави автомобил</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
    <div class="container header-content">
        <div class="brand-box">
            <h1>AutoFinder BG</h1>
            <p>Добавяне на автомобилна обява</p>
        </div>

        <nav class="main-nav">
            <a href="index.html">Начало</a>
            <a href="add-car.html">Добави автомобил</a>
            <a href="profile.html">Профил</a>
            <button id="logoutBtn" class="nav-button">Изход</button>
        </nav>
    </div>
</header>

<main>
    <section class="hero small-hero">
        <div class="container">
            <h2>Добави нов автомобил</h2>
            <p>Попълни информацията и качи снимки на автомобила.</p>
        </div>
    </section>

    <section class="container panel">
        <h2>Данни за автомобила</h2>

        <form id="carForm">
            <div class="form-grid">
                <input type="text" id="brand" placeholder="Марка" required>
                <input type="text" id="model" placeholder="Модел" required>
                <input type="number" id="year" placeholder="Година" required>
                <input type="number" id="price" placeholder="Цена в евро" required>
                <input type="number" id="mileage" placeholder="Пробег в км." required>

                <select id="fuel" required>
                    <option value="">Избери гориво</option>
                    <option value="Бензин">Бензин</option>
                    <option value="Дизел">Дизел</option>
                    <option value="Хибрид">Хибрид</option>
                    <option value="Електрически">Електрически</option>
                </select>

                <select id="gearbox" required>
                    <option value="">Скоростна кутия</option>
                    <option value="Ръчна">Ръчна</option>
                    <option value="Автоматична">Автоматична</option>
                </select>

                <input type="text" id="power" placeholder="Мощност, напр. 150 к.с.">
                <input type="text" id="color" placeholder="Цвят">
                <input type="text" id="extras" placeholder="Екстри: климатик, навигация, парктроник">
            </div>

            <div class="file-box">
                <label for="imageInput">Снимки на автомобила</label>
                <input type="file" id="imageInput" accept="image/*" multiple>
                <p>Можеш да качиш една или няколко снимки.</p>
                <div id="imagePreviewGrid" class="image-preview-grid"></div>
            </div>

            <textarea id="description" placeholder="Кратко описание на автомобила"></textarea>

            <button type="submit" class="full-btn">Добави автомобил</button>
        </form>

        <p id="successMessage" class="success-message"></p>
    </section>
</main>

<footer>
    <p>AutoFinder BG © 2026 | Учебен софтуерен проект</p>
</footer>

<script src="script.js"></script>
</body>
</html>
