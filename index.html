<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFinder BG | Начало</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-content">
            <div>
                <h1>AutoFinder BG</h1>
                <p>Система за търсене на автомобили</p>
            </div>

            <nav>
                <a href="index.html">Начало</a>
                <a href="add-car.html">Добави автомобил</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h2>Намери подходящия автомобил</h2>
                <p>Разгледай обяви и филтрирай по марка, гориво, цена и година.</p>
            </div>
        </section>

        <section class="container search-box">
            <h2>Филтри за търсене</h2>

            <div class="filters">
                <input type="text" id="searchText" placeholder="Търси по марка, модел или екстра">

                <select id="brandFilter">
                    <option value="">Всички марки</option>
                    <option value="BMW">BMW</option>
                    <option value="Audi">Audi</option>
                    <option value="Mercedes">Mercedes</option>
                    <option value="Volkswagen">Volkswagen</option>
                    <option value="Toyota">Toyota</option>
                    <option value="Opel">Opel</option>
                    <option value="Ford">Ford</option>
                </select>

                <select id="fuelFilter">
                    <option value="">Всички горива</option>
                    <option value="Бензин">Бензин</option>
                    <option value="Дизел">Дизел</option>
                    <option value="Хибрид">Хибрид</option>
                    <option value="Електрически">Електрически</option>
                </select>

                <select id="gearboxFilter">
                    <option value="">Всички скорости</option>
                    <option value="Ръчна">Ръчна</option>
                    <option value="Автоматична">Автоматична</option>
                </select>

                <input type="number" id="maxPriceFilter" placeholder="Цена до">
                <input type="number" id="minYearFilter" placeholder="Година от">

                <button id="searchBtn">Търси</button>
                <button id="clearBtn" class="secondary-btn">Изчисти</button>
            </div>
        </section>

        <section class="container cars-section">
            <div class="section-title-row">
                <h2>Налични автомобили</h2>
                <a href="add-car.html" class="add-link">+ Добави автомобил</a>
            </div>

            <div id="carsContainer" class="cars-grid">
                <!-- JavaScript показва автомобилите тук -->
            </div>
        </section>
    </main>

    <footer>
        <p>AutoFinder BG &copy; 2026 | Учебен софтуерен проект</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
